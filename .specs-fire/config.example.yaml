# FIRE team per-project configuration — copy to .specs-fire/config.yaml in the
# consuming repo and fill in your values. Read by .specsmd/fire/agents/team/agent.md.
# Every key is optional: a missing key falls back to host/project defaults, so an
# empty or absent config still yields a working flow. This file is where ALL
# project- and machine-specific values live; the flow files stay portable.

# Worker model tiers for the orchestrator's complexity gate. The strong tier runs
# reasoning-bearing items (complexity medium/high); the cheap tier runs mechanical
# items (kind config-only/docs-only/test, complexity low). Omit to dispatch every
# builder with the host's default model. Tip: also pin `model:`/`effort:` in
# .claude/agents/specsmd-fire-team-builder.md frontmatter (preserved by the sync
# script) so direct spawns default to the strong tier.
models:
  strong: claude-opus-4-8
  cheap: claude-sonnet-4-6

# Authoritative finalize gate: ordered shell commands the orchestrator runs ONCE
# on the integrated tree before merging an intent. Omit to fall back to the
# project's standard production build + full test suite.
verification:
  finalize:
    - npm run build
    - npm test
    - node .specsmd/fire/agents/team-builder/scripts/sync-claude-agent.cjs --check

# Budget-halt integration: flag_file is checked before every dispatch wave;
# wait_script is launched in the background at halt-finalize and should exit when
# the budget window resets. Omit both to disable the HALT gate (a builder that
# still hits a budget cap halts gracefully and the run resumes manually).
# halt:
#   flag_file: ~/.claude/wrap-up-state/HALT
#   wait_script: ~/.claude/bin/wait-for-budget-reset.sh

# Path to a project knowledge-base index builders should walk first when their
# curated context is insufficient. Omit if the project has none.
# knowledge:
#   index: .claude-memory/knowledge/index.md
