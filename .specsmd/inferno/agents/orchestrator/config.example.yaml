# INFERNO per-project configuration — copy to .specs-inferno/config.yaml in the
# consuming repo and fill in your values, or run /specsmd-inferno-config to be
# walked through it. Read by .specsmd/inferno/agents/orchestrator/agent.md. Every key is
# optional: a missing key falls back to host/project defaults, so an empty or
# absent config still yields a working flow. This file is where ALL project- and
# machine-specific values live; the flow files stay portable.

# Top-level mode — the single knob for how deep INFERNO plans and how it closes.
# The planner ALWAYS stops after writing the work items — it NEVER starts the
# build, in either mode. The build is always a separate, explicit /specsmd-inferno
# step you run later. `mode` controls exactly three things:
#   production  - a staged, deep intake questionnaire during intent/decisions
#                 capture; ONE post-write review pause after the planner writes
#                 the work items (surfaces only the urgent or questionable points
#                 — open design questions, risky assumptions, ambiguous
#                 requirements, deferred items — and invites you to weigh in /
#                 inspect the work items, then stops); and a delivery DEFAULT of
#                 `merge-request`.
#   autonomous  - a lean intake questionnaire; no review pause (the planner
#                 writes the work items and stops immediately); and a delivery
#                 DEFAULT of `auto-close`.
# Nothing else changes between modes: model tiers, the budget-halt gate, and the
# finalize verification commands below are all mode-independent.
# `delivery.mode` (further down), when set explicitly, always overrides the
# mode-derived delivery default.
# Legacy mapping (pre-`mode` configs): `autonomy.level: review` -> production,
# `autonomy.level: full` -> autonomous (legacy key). Omitting `mode` and any
# legacy `autonomy.level` both behaves as `production`.
mode: production        # production | autonomous

# Worker model tiers. Two consumers read these:
#  - the ORCHESTRATOR's complexity gate for builders: the strong tier runs
#    reasoning-bearing items (complexity medium/high); the cheap tier runs
#    mechanical items (kind config-only/docs-only/test, complexity low);
#  - the PLANNER's decomposition fan-out: the `writer` tier runs the pure-scribe
#    subagents that render one work-item file each, in parallel.
# Omit `strong`/`cheap` to dispatch every builder with the host's default model.
# Mode-independent — the same tiers apply in production and autonomous mode.
#
# IMPORTANT: values are passed VERBATIM as the per-dispatch model override, so
# they must be in the form the host's dispatch accepts. On Claude Code that is
# the Agent-tool aliases opus / sonnet / haiku — NOT full model IDs. Exact
# version pins can be set by editing the frontmatter of the installed
# .claude/agents/specsmd-inferno-builder.md (note: re-running the specsmd
# installer regenerates that file).
#
# Effort/reasoning is NOT set here. Claude Code has no per-dispatch effort override
# (only model), so effort is pinned in the builder subagent's frontmatter
# (`effort: xhigh` in agents/builder/agent.md + commands/inferno-builder.md), which
# overrides the session effort level whenever a builder runs. Edit that frontmatter
# to change it. Available levels (low|medium|high|xhigh|max) depend on the model —
# opus supports xhigh; a cheap model may clamp it, which is fine for mechanical work.
models:
  strong: opus     # complexity medium/high builders, at xhigh effort
  cheap: sonnet     # complexity low + kind config-only/docs-only/test builders
  writer: sonnet    # planner's parallel scribe subagents; omit to fall back to `cheap`

# Authoritative finalize gate: ordered shell commands the orchestrator runs ONCE
# on the integrated tree before merging an intent. Omit to fall back to the
# project's standard production build + full test suite. Mode-independent.
verification:
  finalize:
    - npm run build
    - npm test

# Delivery mode: how the orchestrator integrates and closes an intent.
#   auto-close    - commit each work item directly onto the intent branch, then
#                   at finalize merge locally into the base branch, tear down
#                   the worktree, and push. No review gate.
#   merge-request - each work item lands on the intent branch via a NON-BLOCKING
#                   merge request (opened for record / auto-merge), and at
#                   finalize the intent branch is pushed and a merge request is
#                   opened into the base branch as the single human review gate —
#                   the orchestrator stops there (no local merge / teardown).
#                   Forge-aware: uses gh (GitHub) or glab (GitLab) when present.
# Precedence, highest first: (1) an explicit `delivery.mode` set here always
# wins; (2) otherwise the default is derived from the top-level `mode` above
# (production -> merge-request, autonomous -> auto-close); (3) if both `mode`
# and `delivery.mode` are absent, the default is `merge-request` (production).
# base_branch is the branch the intent merges into. Omit to let the orchestrator
# propose it (the branch the intent was created from) and confirm with you.
# Omit the whole section to use the mode-derived default.
# delivery:
#   mode: auto-close          # auto-close | merge-request
#   base_branch: main         # optional; orchestrator proposes + confirms when unset

# Budget-halt integration: flag_file is checked before every dispatch wave;
# wait_script is launched in the background at halt-finalize and should exit when
# the budget window resets. Omit both to disable the HALT gate (a builder that
# still hits a budget cap halts gracefully and the run resumes manually).
# Mode-independent.
# halt:
#   flag_file: /absolute/path/to/HALT
#   wait_script: /absolute/path/to/wait-for-budget-reset.sh

# Path to a project knowledge-base index builders should walk first when their
# curated context is insufficient. Omit if the project has none. Mode-independent.
# knowledge:
#   index: docs/knowledge/index.md
